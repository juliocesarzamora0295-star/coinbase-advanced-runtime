name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Check syntax with compileall
      run: |
        python -m compileall -q src tests

    - name: Lint with ruff
      run: |
        ruff check src/ tests/

    - name: Format check with black
      run: |
        black --check src/ tests/

    - name: Type check with mypy
      run: |
        mypy src/risk/ src/execution/ src/accounting/ src/oms/ src/strategy/ src/marketdata/orderbook.py --ignore-missing-imports

    - name: Unit tests with coverage (global ≥ 70%)
      run: |
        python -m pytest tests/unit/ -v --tb=short \
          --cov=src --cov-report=term-missing \
          --cov-fail-under=70

    - name: Coverage gates — critical modules ≥ 90%
      run: |
        python -m pytest tests/unit/ -q --tb=short \
          --cov=src/oms --cov=src/execution --cov=src/accounting --cov=src/risk \
          --cov-report=term-missing \
          --cov-fail-under=90

    - name: Integration tests (no credentials required)
      run: |
        python -m pytest tests/integration/ -v --tb=short \
          --ignore=tests/integration/test_coinbase_api.py \
          --ignore=tests/integration/test_websocket_integration.py

  live-integration-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(github.event.head_commit.message, '[integration]')

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Live integration tests (requires secrets)
      env:
        COINBASE_KEY_NAME: ${{ secrets.COINBASE_KEY_NAME }}
        COINBASE_KEY_SECRET: ${{ secrets.COINBASE_KEY_SECRET }}
        COINBASE_RUN_LIVE_TESTS: "1"
      run: |
        pytest tests/integration/ -v --tb=short
      if: env.COINBASE_KEY_NAME != ''
