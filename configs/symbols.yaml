# Configuración de símbolos para Fortress v4
# Live canary — BTC-USD 5m, observe_only=false, dry_run=false
# Capital aislado: portfolio nuevo $25 USD en BTC

symbols:
  - symbol: "BTC-USD"
    enabled: true
    timeframe: "5m"
    strategies:
      - name: "sma_crossover"
        sma_fast: 5
        sma_slow: 15

  - symbol: "ETH-USD"
    enabled: false
    timeframe: "1h"
    strategies:
      - name: "sma_crossover"
        sma_fast: 10
        sma_slow: 30

# Configuración global de trading
trading:
  dry_run: false            # false = órdenes reales habilitadas
  observe_only: false       # false = ejecuta si RiskGate permite
  max_position_pct: 0.50   # 50% del capital por posición (cap real: max_notional)
  max_notional_per_symbol: 25.0  # hard cap = capital total del portfolio
  max_orders_per_minute: 3       # conservador para canary
  smoke_test_mode: false
  max_cycles: 0             # sin límite — detener manualmente con Ctrl+C
  risk_per_trade_pct: 0.02  # 2% del equity = ~$0.50 risk por trade

# Configuración de riesgo — breaker agresivo para canary
risk:
  max_daily_loss: 0.05      # 5% = ~$1.25 pérdida diaria antes de circuit trip
  max_drawdown: 0.10        # 10% = ~$2.50 drawdown máximo
  max_consecutive_losses: 2 # 2 pérdidas consecutivas → circuit open

# Configuración de monitoreo
monitoring:
  log_level: "INFO"
  latency_p95_threshold_ms: 500.0
  reject_rate_threshold: 0.10
  slippage_drift_threshold_bps: 10.0
