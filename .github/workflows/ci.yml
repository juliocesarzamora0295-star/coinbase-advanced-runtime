name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Smoke test (build + core imports)
      run: bash scripts/ci_smoke.sh

    - name: Config validation
      run: python -m src.config_validator configs/symbols.yaml

    - name: Lint with ruff
      run: ruff check src/ tests/

    - name: Format check with black
      run: black --check src/ tests/

    - name: Type check with mypy (all modules)
      run: |
        mypy src/risk/ src/execution/ src/accounting/ src/oms/ \
             src/observability/ src/backtest/ src/strategy/ \
             src/marketdata/orderbook.py src/quantitative/

    - name: Unit tests with coverage (global ≥ 70%)
      run: |
        python -m pytest tests/unit/ -v --tb=short \
          --cov=src --cov-report=term-missing \
          --cov-report=html:coverage-html \
          --cov-fail-under=70

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: coverage-html/
        retention-days: 14

    - name: Coverage gates — critical modules ≥ 90%
      run: |
        python -m pytest tests/unit/ -q --tb=short \
          --cov=src/oms --cov=src/execution --cov=src/accounting --cov=src/risk \
          --cov-report=term-missing \
          --cov-fail-under=90

    - name: Integration tests (no credentials required)
      run: |
        python -m pytest tests/integration/ -v --tb=short \
          --ignore=tests/integration/test_coinbase_integration.py \
          --ignore=tests/integration/test_websocket_integration.py

    - name: Quantitative certification tests
      run: |
        python -m pytest tests/quantitative/ -v --tb=short

    - name: Package install smoke (artifact verification)
      run: |
        python -m venv /tmp/pkg-smoke
        /tmp/pkg-smoke/bin/pip install --quiet .
        /tmp/pkg-smoke/bin/python -c "
        from src.risk.gate import RiskGate
        from src.oms.reconcile import OMSReconcileService
        from src.execution.order_planner import OrderPlanner
        from src.monitoring.alert_manager import AlertManager
        from src.quantitative.metrics import compute_metrics
        print('Package install smoke: ALL IMPORTS OK')
        "
        rm -rf /tmp/pkg-smoke

    - name: Docker build smoke
      run: |
        if command -v docker &> /dev/null; then
          docker build -t fortress-smoke .
          echo "Docker build OK"
        else
          echo "Docker not available — running build smoke script instead"
          bash scripts/ci_smoke.sh
        fi

  # Scheduled live integration — runs weekly or on manual trigger
  live-integration-test:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'schedule') ||
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[integration]'))

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Live integration tests (requires secrets)
      env:
        COINBASE_KEY_NAME: ${{ secrets.COINBASE_KEY_NAME }}
        COINBASE_KEY_SECRET: ${{ secrets.COINBASE_KEY_SECRET }}
        COINBASE_RUN_LIVE_TESTS: "1"
      run: |
        pytest tests/integration/ -v --tb=short
      if: env.COINBASE_KEY_NAME != ''
