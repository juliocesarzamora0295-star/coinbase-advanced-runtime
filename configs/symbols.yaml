trading:
  observe_only: false
  dry_run: false
  smoke_test_mode: false
  max_cycles: 0
  max_position_pct: 0.002
  max_notional_per_symbol: 25.0
  max_orders_per_minute: 2
  risk_per_trade_pct: 0.001
  sizing_mode: NOTIONAL

risk:
  max_daily_loss: 0.01
  max_drawdown: 0.02
  max_consecutive_losses: 1

monitoring:
  log_level: INFO
  latency_p95_threshold_ms: 500.0
  reject_rate_threshold: 0.03
  slippage_drift_threshold_bps: 10.0

symbols:
  - symbol: BTC-USD
    enabled: true
    timeframe: 5m
    strategies:
      - name: sma_crossover
        sma_fast: 5
        sma_slow: 15
